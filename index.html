<script type="text/babel" data-presets="react">

const uid = () => Math.random().toString(36).slice(2, 10);
function todayStr() { return new Date().toISOString().slice(0, 10); }
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function getMonday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}
function fmtDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function fmtDateWeekday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function fmtDateFull(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}
function fmtMoney(n, currency = "USD") {
  return n.toLocaleString("en-US", { style: "currency", currency });
}
function fmtRelative(iso) {
  const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}
function dateRange(start, end) {
  const out = [];
  let cur = start, guard = 0;
  while (cur <= end && guard < 400) { out.push(cur); cur = addDays(cur, 1); guard++; }
  return out;
}

async function kvGetAll(workspaceId) {
  const { data, error } = await sb.from("kv").select("key,value").eq("workspace_id", workspaceId);
  if (error) throw error;
  const map = {};
  for (const row of data) map[row.key] = row.value;
  return map;
}
async function kvSet(workspaceId, key, value) {
  const { error } = await sb.from("kv").upsert({ workspace_id: workspaceId, key, value, updated_at: new Date().toISOString() });
  if (error) throw error;
}

/* ---- Biometric unlock (device-local convenience only, not a secure login) ---- */
async function biometricAvailable() {
  if (!window.PublicKeyCredential) return false;
  try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); } catch { return false; }
}
async function biometricPrompt() {
  try {
    await navigator.credentials.create({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp: { name: "LabourArc" },
        user: { id: crypto.getRandomValues(new Uint8Array(16)), name: "user", displayName: "LabourArc User" },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
        timeout: 60000,
      },
    });
    return true;
  } catch {
    return false;
  }
}

}

const CalendarIcon = (p) => <Icon {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></Icon>;
const DollarIcon = (p) => <Icon {...p}><path d="M12 2v20M17 6.5c0-1.9-2.2-3-5-3s-5 1.1-5 3 2.2 2.7 5 3 5 1.1 5 3-2.2 3-5 3-5-1.1-5-3"/></Icon>;

const GearIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></Icon>;
const LockIcon = (p) => <Icon {...p}><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></Icon>;
const DownloadIcon = (p) => <Icon {...p}><path d="M12 3v13m0 0l-4-4m4 4l4-4"/><path d="M4 19h16"/></Icon>;
const UploadIcon = (p) => <Icon {...p}><path d="M12 21V8m0 0l-4 4m4-4l4 4"/><path d="M4 19h16"/></Icon>;
const CheckIcon = (p) => <Icon {...p}><path d="M20 6L9 17l-5-5"/></Icon>;
const MapPinIcon = (p) => <Icon {...p}><path d="M12 21s7-6.2 7-11.5A7 7 0 0 0 5 9.5C5 14.8 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.5"/></Icon>;

const CURRENCIES = ["USD", "CAD", "GBP", "EUR", "AUD", "INR", "PKR"];

const DEFAULT_SETTINGS = {
  pinLength: 6,
  currency: "USD",
  overtime: { enabled: false, multiplier: 1.5, threshold: "weekly" }, // threshold: 'weekly' | 'daily'
  payPeriod: { type: "weekly", weekStartsOn: 1, biweeklyAnchor: todayStr() }, // type: 'weekly'|'biweekly'|'semimonthly'
  breakDeduction: { enabled: false, minutes: 30 }, // subtracted once per day worked
  company: { name: "", address: "", phone: "", email: "", logo: null },
  deductions: [], // [{id, label, type: 'percent'|'flat', value}]
};

function App() {
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);

  const [employees, setEmployees] = useState([]);
  const [entries, setEntries] = useState([]);
  const [dayNotes, setDayNotes] = useState({});
  const [paidRanges, setPaidRanges] = useState({});
  const [deletedLog, setDeletedLog] = useState([]);
  const [employerPin, setEmployerPin] = useState(null);
  const [jobSites, setJobSites] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);

  const [role, setRole] = useState(() => localStorage.getItem("wp_role") || null);

  // Employer auth
  const [session, setSession] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [workspace, setWorkspace] = useState(null);
  const [workspaceChecked, setWorkspaceChecked] = useState(false);
  const [employerUnlocked, setEmployerUnlocked] = useState(() => localStorage.getItem("wp_employer_unlocked") === "1");

  // Employee join + identity
  const [empWorkspaceId, setEmpWorkspaceId] = useState(() => localStorage.getItem("wp_emp_ws_id") || null);
  const [empWorkspaceName, setEmpWorkspaceName] = useState(() => localStorage.getItem("wp_emp_ws_name") || "");
  const [myEmployeeId, setMyEmployeeId] = useState(() => localStorage.getItem("wp_myId") || null);
  const [myUnlocked, setMyUnlocked] = useState(() => {
    const id = localStorage.getItem("wp_myId");
    return id ? localStorage.getItem("wp_unlocked_" + id) === "1" : false;
  });

  const modalOpenRef = useRef(false);
  const activeWorkspaceId = role === "employer" ? (workspace ? workspace.id : null) : empWorkspaceId;

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session || null); setAuthChecked(true); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, sess) => setSession(sess));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (role !== "employer" || !session) { setWorkspaceChecked(role !== "employer"); return; }
    (async () => {
      const { data } = await sb.from("workspaces").select("id,name,company_code").eq("owner_id", session.user.id).maybeSingle();
      setWorkspace(data || null);
      setWorkspaceChecked(true);
    })();
  }, [role, session]);

  async function refreshAll() {
    if (!activeWorkspaceId) return;
    try {
      const map = await kvGetAll(activeWorkspaceId);
      setEmployees(map.employees || []);
      setEntries(map.entries || []);
      setDayNotes(map.dayNotes || {});
      setPaidRanges(map.paidRanges || {});
      setDeletedLog(map.deletedLog || []);
      setEmployerPin(map.employerPin ?? null);
      setJobSites(map.jobSites || []);
      setSettings({ ...DEFAULT_SETTINGS, ...(map.settings || {}) });
    } catch (e) {
      setError("Couldn't connect to the shared database. Check your connection.");
    }
  }

  useEffect(() => {
    if (!activeWorkspaceId) { setLoaded(role !== "employer" && role !== "employee"); return; }
    setLoaded(false);
    refreshAll().finally(() => setLoaded(true));
    const iv = setInterval(() => { if (!modalOpenRef.current) refreshAll(); }, 15000);
    return () => clearInterval(iv);
  }, [activeWorkspaceId]);

  async function persist(key, value, setter) {
    setter(value);
    setSaving(true);
    try {
      await kvSet(activeWorkspaceId, key, value);
    } catch {
      setError("Couldn't save — check your connection and try again.");
    } finally {
      setSaving(false);
    }
  }

  function setRolePersist(r) {
    setRole(r);
    if (r) localStorage.setItem("wp_role", r); else localStorage.removeItem("wp_role");
  }
  function setMyIdPersist(id) {
    setMyEmployeeId(id);
    if (id) {
      localStorage.setItem("wp_myId", id);
      setMyUnlocked(localStorage.getItem("wp_unlocked_" + id) === "1");
    } else {
      localStorage.removeItem("wp_myId");
      setMyUnlocked(false);
    }
  }
  function unlockEmployerRemember() {
    localStorage.setItem("wp_employer_unlocked", "1");
    setEmployerUnlocked(true);
  }
  function unlockEmployeeRemember(id) {
    localStorage.setItem("wp_unlocked_" + id, "1");
    setMyUnlocked(true);
  }
  function switchUser() {
    if (role === "employer") {
      sb.auth.signOut();
      localStorage.removeItem("wp_employer_unlocked");
    }
    setRolePersist(null);
    setMyIdPersist(null);
    setEmployerUnlocked(false);
    setMyUnlocked(false);
    setWorkspace(null);
    setWorkspaceChecked(false);
  }
  function joinWorkspace(ws) {
    setEmpWorkspaceId(ws.id);
    setEmpWorkspaceName(ws.name);
    localStorage.setItem("wp_emp_ws_id", ws.id);
    localStorage.setItem("wp_emp_ws_name", ws.name);
  }

  const showLoading = role === "employer" ? (!authChecked || (session && !workspaceChecked) || (workspace && !loaded)) : (role === "employee" && empWorkspaceId && !loaded);

  if (showLoading) {
    return (
      <div style={{ minHeight: "100vh", background: BG, display: "flex", alignItems: "center", justifyContent: "center" }} className="brand" >
        <div style={{ color: NAVY, fontWeight: 800, fontSize: 22 }}>Loading LabourArc…</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: BG, fontFamily: "'Inter', sans-serif", display: "flex", flexDirection: "column" }}>
      {error && (
        <div className="px-4 py-2 text-sm text-white text-center" style={{ background: RED }}>
          {error}
        </div>
      )}

      {!role ? (
        <RoleGate setRole={setRolePersist} />
      ) : role === "employer" ? (
        !session ? (
          <EmployerAuthScreen onBack={() => setRolePersist(null)} />
        ) : !workspace ? (
          <CreateWorkspaceScreen session={session} onCreated={setWorkspace} onBack={() => setRolePersist(null)} />
        ) : !employerPinReady(employerPin, employerUnlocked) ? (
          employerPin === null ? (
            <CreatePin
              title="Create Employer PIN"
              subtitle="This protects full access to crew data and payroll on this device."
              pinLength={settings.pinLength}
              onDone={(pin) => { persist("employerPin", pin, setEmployerPin); unlockEmployerRemember(); }}
              onBack={() => setRolePersist(null)}
            />
          ) : (
            <EnterPin
              title="Employer PIN"
              expected={employerPin}
              pinLength={settings.pinLength}
              onSuccess={() => unlockEmployerRemember()}
              onBack={() => setRolePersist(null)}
            />
          )
        ) : (
          <EmployerApp
            employees={employees} entries={entries} dayNotes={dayNotes} paidRanges={paidRanges} deletedLog={deletedLog} employerPin={employerPin} workspace={workspace}
            jobSites={jobSites} settings={settings}
            persist={persist} switchUser={switchUser} modalOpenRef={modalOpenRef} saving={saving}
          />
        )
      ) : (
        !empWorkspaceId ? (
          <CompanyCodeScreen onJoined={joinWorkspace} onBack={() => setRolePersist(null)} />
        ) : !myEmployeeId ? (
          <EmployeePicker employees={employees} companyName={empWorkspaceName} onPick={setMyIdPersist} onBack={() => { setEmpWorkspaceId(null); localStorage.removeItem("wp_emp_ws_id"); setRolePersist(null); }} />
        ) : (
          (() => {
            const me = employees.find((e) => e.id === myEmployeeId);
            if (!me) return <EmployeePicker employees={employees} companyName={empWorkspaceName} onPick={setMyIdPersist} onBack={() => { setMyIdPersist(null); setRolePersist(null); }} />;
            if (!me.pin) {
              return (
                <CreatePin
                  title={`Create Your PIN, ${me.name}`}
                  subtitle="Only you will use this to see your hours and payroll."
                  pinLength={settings.pinLength}
                  onDone={(pin) => {
                    const next = employees.map((e) => (e.id === me.id ? { ...e, pin } : e));
                    persist("employees", next, setEmployees);
                    unlockEmployeeRemember(me.id);
                  }}
                  onBack={() => setMyIdPersist(null)}
                />
              );
            }
            if (!myUnlocked) {
              return <EnterPin title={`Welcome back, ${me.name}`} expected={me.pin} pinLength={settings.pinLength} onSuccess={() => unlockEmployeeRemember(me.id)} onBack={() => setMyIdPersist(null)} />;
            }
            return (
              <EmployeeApp
                me={me} entries={entries} dayNotes={dayNotes} jobSites={jobSites} settings={settings}
                persist={persist} allEntries={entries} switchUser={switchUser}
              />
            );
          })()
        )
      )}

      <Footer />
    </div>
  );
}

function employerPinReady(employerPin, unlocked) {
  return employerPin !== null && unlocked;
}

function GlobalStyle() { return null; }

function Footer() {
  return (
    <div className="no-print text-center py-4 mono text-xs" style={{ color: SLATE, opacity: 0.8 }}>
      Powered by Barkat Home Creations LTD.
    </div>
  );
}

  return (
    <div className="flex items-center justify-between px-5 pt-6 pb-2 max-w-4xl mx-auto w-full">
      <div className="flex items-center gap-2">
        <div className="brand text-2xl" style={{ fontWeight: 800 }}>
          <span style={{ color: NAVY }}>Labour</span><span style={{ color: ROYAL }}>Arc</span>
        </div>
      </div>

    </div>

function RoleGate({ setRole }) {
  return (
    <div className="flex-1 flex flex-col">
      <BrandHeader />
      <div className="flex-1 flex flex-col items-center justify-center px-6">
        <div className="mono text-xs mb-8" style={{ color: SLATE, letterSpacing: "0.1em" }}>TIME · PAYROLL · PRODUCTIVITY</div>
        <div className="w-full max-w-xs space-y-3">
          <button onClick={() => setRole("employer")} className="w-full py-4 rounded-2xl text-white brand text-lg" style={{ background: `linear-gradient(135deg, ${ROYAL_L}, ${ROYAL})`, fontWeight: 800 }}>
            I'm the Employer
          </button>
          <button onClick={() => setRole("employee")} className="w-full py-4 rounded-2xl brand text-lg" style={{ background: CARD, color: NAVY, border: `2px solid ${BORDER}`, fontWeight: 800 }}>
            I'm a Crew Member
          </button>
        </div>
      </div>
    </div>
  );
}

function EmployerAuthScreen({ onBack }) {
  const [mode, setMode] = useState("signup"); // signup | login | reset
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [info, setInfo] = useState("");

  async function submit() {
    setErr(""); setInfo("");
    if (!email.trim() || password.length < 6) { setErr("Enter a valid email and a password of at least 6 characters."); return; }
    setBusy(true);
    try {
      if (mode === "signup") {
        const { error } = await sb.auth.signUp({ email: email.trim(), password });
        if (error) throw error;
        setInfo("Account created — you're signed in.");
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
      }
    } catch (e) {
      setErr(e.message || "Something went wrong.");
    } finally {
      setBusy(false);
    }
  }

  async function sendReset() {
    setErr(""); setInfo("");
    if (!email.trim()) { setErr("Enter the email on your account first."); return; }
    setBusy(true);
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.href });
      if (error) throw error;
      setInfo("Check your email for a password reset link.");
    } catch (e) {
      setErr(e.message || "Couldn't send the reset email.");
    } finally {
      setBusy(false);
    }
  }

  if (mode === "reset") {
    return (
      <div className="flex-1 flex flex-col">
        <BrandHeader right={<button onClick={onBack} className="text-sm" style={{ color: SLATE }}>Back</button>} />
        <div className="flex-1 flex flex-col items-center justify-center px-6">
          <div className="w-full max-w-xs">
            <div className="brand text-lg mb-4 text-center" style={{ color: NAVY, fontWeight: 800 }}>Reset Password</div>
            {err && <div className="text-xs mb-3 text-center" style={{ color: RED }}>{err}</div>}
            {info && <div className="text-xs mb-3 text-center" style={{ color: GREEN }}>{info}</div>}

function CreateWorkspaceScreen({ session, onCreated, onBack }) {
  const [name, setName] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  function genCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let out = "";
    for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  async function create() {
    if (!name.trim()) { setErr("Enter your company name."); return; }
    setBusy(true); setErr("");
    let attempts = 0;
    while (attempts < 5) {
      const code = genCode();
      const { data, error } = await sb.from("workspaces").insert({ owner_id: session.user.id, name: name.trim(), company_code: code }).select("id,name,company_code").single();
      if (!error) { onCreated(data); return; }
      if (!String(error.message).includes("duplicate")) { setErr(error.message); setBusy(false); return; }
      attempts++;
    }
    setErr("Couldn't create a unique company code — try again.");
    setBusy(false);
  }

  return (
    <div className="flex-1 flex flex-col">
      <BrandHeader right={<button onClick={onBack} className="text-sm" style={{ color: SLATE }}>Back</button>} />
      <div className="flex-1 flex flex-col items-center justify-center px-6">
        <div className="w-full max-w-xs">
          <div className="brand text-lg mb-2 text-center" style={{ color: NAVY, fontWeight: 800 }}>Set Up Your Company</div>
          <div className="text-sm text-center mb-4" style={{ color: SLATE }}>This creates your own private LabourArc workspace.</div>
          {err && <div className="text-xs mb-3 text-center" style={{ color: RED }}>{err}</div>}
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Company name" className="w-full px-3 py-3 rounded-lg border text-sm mb-4" style={{ borderColor: BORDER }} />
          <button onClick={create} disabled={busy} className="w-full py-3 rounded-lg text-white text-sm" style={{ background: ROYAL, fontWeight: 700 }}>
            {busy ? "Creating…" : "Create Workspace"}
          </button>
        </div>
      </div>
    </div>
  );
}

function CompanyCodeScreen({ onJoined, onBack }) {
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  async function join() {
    if (code.trim().length < 4) { setErr("Enter the company code your employer gave you."); return; }
    setBusy(true); setErr("");
    try {
      const { data, error } = await sb.rpc("lookup_workspace", { code: code.trim() });
      if (error) throw error;
      if (!data || data.length === 0) { setErr("No company found with that code — check with your employer."); setBusy(false); return; }
      onJoined(data[0]);
    } catch (e) {
      setErr("Couldn't verify that code — check your connection and try again.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="flex-1 flex flex-col">

      <div className="flex-1 flex flex-col items-center justify-center px-6">

function CreatePin({ title, subtitle, onDone, onBack, inline, pinLength = 6 }) {
  const [step, setStep] = useState(1);
  const [first, setFirst] = useState("");
  const [val, setVal] = useState("");
  const [err, setErr] = useState("");

  function handleChange(v) {
    const digits = v.replace(/\D/g, "").slice(0, pinLength);
    setVal(digits);
    if (digits.length === pinLength) {
      if (step === 1) {
        setFirst(digits);
        setVal("");
        setStep(2);
      } else {
        if (digits === first) {
          onDone(digits);
        } else {
          setErr("PINs didn't match — try again.");
          setFirst("");
          setVal("");
          setStep(1);
        }
      }
    }
  }

  const body = (
    <div className="flex flex-col items-center">
      {!inline && <LockIcon size={28} color={ROYAL} />}
      <div className={inline ? "text-sm mb-1 text-center" : "brand text-xl mt-3 mb-1 text-center"} style={{ color: NAVY, fontWeight: 800 }}>{title}</div>
      {subtitle && <div className="text-sm text-center mb-2 max-w-xs" style={{ color: SLATE }}>{subtitle}</div>}
      <div className="text-xs mb-4" style={{ color: ROYAL, fontWeight: 600 }}>{step === 1 ? `Enter a ${pinLength}-digit PIN` : "Confirm your PIN"}</div>
      {err && <div className="text-xs mb-3" style={{ color: RED }}>{err}</div>}
      <PinDots value={val} length={pinLength} />
      <input
        autoFocus
        type="tel"
        inputMode="numeric"
        value={val}
        onChange={(e) => handleChange(e.target.value)}
        className="opacity-0 absolute"
        style={{ width: 1, height: 1 }}
        id={inline ? "inline-pin-input" : undefined}
      />
      <button onClick={() => document.getElementById(inline ? "inline-pin-input" : undefined)?.focus() || document.querySelector('input[type=tel]')?.focus()} className="text-xs px-4 py-2 rounded-lg" style={{ background: CARD, border: `1px solid ${BORDER}`, color: SLATE }}>
        Tap here to type
      </button>
      {inline && <button onClick={onBack} className="text-xs mt-3" style={{ color: SLATE }}>Cancel</button>}
    </div>
  );

  if (inline) return <div className="py-2">{body}</div>;

  return (
    <div className="flex-1 flex flex-col">
      <BrandHeader right={<button onClick={onBack} className="text-sm" style={{ color: SLATE }}>Back</button>} />
      <div className="flex-1 flex flex-col items-center justify-center px-6">
        {body}
      </div>
    </div>
  );
}

function EnterPin({ title, expected, onSuccess, onBack, pinLength = 6 }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState("");
  const [bioAvailable, setBioAvailable] = useState(false);

  useEffect(() => { biometricAvailable().then(setBioAvailable); }, []);

  function handleChange(v) {
    const digits = v.replace(/\D/g, "").slice(0, pinLength);
    setVal(digits);
    setErr("");
    if (digits.length === pinLength) {
      if (digits === expected) {
        onSuccess();
      } else {
        setErr("Incorrect PIN — try again.");
        setTimeout(() => setVal(""), 400);
      }
    }
  }

  async function tryBiometric() {
    const ok = await biometricPrompt();
    if (ok) onSuccess();
    else setErr("Face ID / Touch ID wasn't confirmed — enter your PIN instead.");
  }

  return (
    <div className="flex-1 flex flex-col">
      <BrandHeader right={<button onClick={onBack} className="text-sm" style={{ color: SLATE }}>Back</button>} />
      <div className="flex-1 flex flex-col items-center justify-center px-6">
        <LockIcon size={28} color={ROYAL} />
        <div className="brand text-xl mt-3 mb-4 text-center" style={{ color: NAVY, fontWeight: 800 }}>{title}</div>
        {err && <div className="text-xs mb-3" style={{ color: RED }}>{err}</div>}
        <PinDots value={val} length={pinLength} />
        <input
          autoFocus
          type="tel"
          inputMode="numeric"
          value={val}
          onChange={(e) => handleChange(e.target.value)}
          className="opacity-0 absolute"
          style={{ width: 1, height: 1 }}
        />
        <button onClick={() => document.querySelector('input[type=tel]')?.focus()} className="text-xs px-4 py-2 rounded-lg mb-3" style={{ background: CARD, border: `1px solid ${BORDER}`, color: SLATE }}>
          Tap here to type
        </button>
        {bioAvailable && (
          <button onClick={tryBiometric} className="text-xs px-4 py-2 rounded-lg flex items-center gap-1.5" style={{ background: BG, color: ROYAL, fontWeight: 700 }}>
            <LockIcon size={13} />Use Face ID / Touch ID instead
          </button>
        )}
      </div>
    </div>
  );
}

function EmployerApp({ employees, entries, dayNotes, paidRanges, deletedLog, employerPin, workspace, jobSites, settings, persist, switchUser, modalOpenRef, saving }) {
  const [tab, setTab] = useState("log");
  const [empSearch, setEmpSearch] = useState("");
  const [logSearch, setLogSearch] = useState("");

  const [empName, setEmpName] = useState("");
  const [empRate, setEmpRate] = useState("");
  const [editingEmpId, setEditingEmpId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editRate, setEditRate] = useState("");

  const [logEmpIds, setLogEmpIds] = useState([]);
  const [logDate, setLogDate] = useState(todayStr());
  const [logHours, setLogHours] = useState("");
  const [editingEntryId, setEditingEntryId] = useState(null);
  const [editHours, setEditHours] = useState("");

  const [rangeStart, setRangeStart] = useState(getMonday(todayStr()));
  const [rangeEnd, setRangeEnd] = useState(todayStr());

  const [noteCell, setNoteCell] = useState(null);
  const [payslipEmp, setPayslipEmp] = useState(null);
  const [bulkPayslip, setBulkPayslip] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [contactOpen, setContactOpen] = useState(false);

  const [siteName, setSiteName] = useState("");
  const [siteAddress, setSiteAddress] = useState("");
  const [logSiteId, setLogSiteId] = useState("");

  useEffect(() => {
    modalOpenRef.current = !!(noteCell || payslipEmp || bulkPayslip || settingsOpen || contactOpen);
  }, [noteCell, payslipEmp, bulkPayslip, settingsOpen, contactOpen]);

  function addSite() {
    if (!siteName.trim()) return;
    persist("jobSites", [...jobSites, { id: uid(), name: siteName.trim(), address: siteAddress.trim() }], () => {});
    setSiteName(""); setSiteAddress("");
  }
  function removeSite(id) {
    persist("jobSites", jobSites.filter((s) => s.id !== id), () => {});
  }

  function addEmployee() {
    if (!empName.trim() || !empRate || Number(empRate) <= 0) return;
    persist("employees", [...employees, { id: uid(), name: empName.trim(), rate: Number(empRate), pin: null }], () => {});
    setEmpName(""); setEmpRate("");
  }
  function saveEmployeesLocal(next) { persist("employees", next, () => {}); }
  function saveEntriesLocal(next) { persist("entries", next, () => {}); }
  function saveNotesLocal(next) { persist("dayNotes", next, () => {}); }
  function savePaidLocal(next) { persist("paidRanges", next, () => {}); }
  function saveLogLocal(next) { persist("deletedLog", next, () => {}); }

  function startEditEmp(e) { setEditingEmpId(e.id); setEditName(e.name); setEditRate(String(e.rate)); }
  function saveEditEmp(id) {
    if (!editName.trim() || !editRate || Number(editRate) <= 0) return;
    saveEmployeesLocal(employees.map((e) => (e.id === id ? { ...e, name: editName.trim(), rate: Number(editRate) } : e)));
    setEditingEmpId(null);
  }
  function resetEmpPin(id) {
    saveEmployeesLocal(employees.map((e) => (e.id === id ? { ...e, pin: null } : e)));
  }
  function removeEmployee(id) {
    const emp = employees.find((e) => e.id === id);
    if (!emp) return;
    const related = entries.filter((t) => t.employeeId === id);
    const logId = uid();
    saveLogLocal([{ id: logId, type: "employee", label: emp.name, deletedAt: new Date().toISOString(), payload: { employee: emp, entries: related } }, ...deletedLog]);
    saveEmployeesLocal(employees.filter((e) => e.id !== id));
    saveEntriesLocal(entries.filter((t) => t.employeeId !== id));
  }

  function toggleLogEmp(id) { setLogEmpIds((prev) => (prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id])); }
  function toggleLogEmpAll() { setLogEmpIds((prev) => (prev.length === filteredEmployees.length ? [] : filteredEmployees.map((e) => e.id))); }
  function addEntry() {
    if (logEmpIds.length === 0 || !logDate || !logHours || Number(logHours) <= 0) return;
    const newEntries = logEmpIds.map((id) => ({ id: uid(), employeeId: id, date: logDate, hours: Number(logHours), siteId: logSiteId || null }));
    saveEntriesLocal([...entries, ...newEntries]);
    setLogHours(""); setLogEmpIds([]); setLogSiteId("");
  }
  function startEditEntry(t) { setEditingEntryId(t.id); setEditHours(String(t.hours)); }
  function saveEditEntry(id) {
    if (!editHours || Number(editHours) <= 0) return;
    saveEntriesLocal(entries.map((t) => (t.id === id ? { ...t, hours: Number(editHours) } : t)));
    setEditingEntryId(null);
  }
  function removeEntry(id) {
    const entry = entries.find((t) => t.id === id);
    if (!entry) return;
    const emp = employees.find((e) => e.id === entry.employeeId);
    const logId = uid();
    saveLogLocal([{ id: logId, type: "entry", label: `${emp ? emp.name : "Unknown"} · ${fmtDate(entry.date)} · ${entry.hours}h`, deletedAt: new Date().toISOString(), payload: entry }, ...deletedLog]);
    saveEntriesLocal(entries.filter((t) => t.id !== id));
  }
  function restoreItem(logId) {
    const item = deletedLog.find((d) => d.id === logId);
    if (!item) return;
    if (item.type === "employee") {
      saveEmployeesLocal([...employees, item.payload.employee]);
      saveEntriesLocal([...entries, ...item.payload.entries]);
    } else {
      saveEntriesLocal([...entries, item.payload]);
    }
    saveLogLocal(deletedLog.filter((d) => d.id !== logId));
  }
  function purgeHistoryItem(logId) { saveLogLocal(deletedLog.filter((d) => d.id !== logId)); }

  function setPreset(preset) {
    const t = todayStr();
    if (preset === "thisWeek") { setRangeStart(getMonday(t)); setRangeEnd(t); }
    else if (preset === "lastWeek") { const lm = addDays(getMonday(t), -7); setRangeStart(lm); setRangeEnd(addDays(lm, 6)); }
    else if (preset === "last30") { setRangeStart(addDays(t, -29)); setRangeEnd(t); }
  }

  const filteredEmployees = useMemo(
    () => employees.filter((e) => e.name.toLowerCase().includes(empSearch.toLowerCase())),
    [employees, empSearch]
  );
  const filteredEntries = useMemo(() => {
    const sorted = [...entries].sort((a, b) => (a.date < b.date ? 1 : -1));
    if (!logSearch.trim()) return sorted;
    const q = logSearch.toLowerCase();
    return sorted.filter((t) => {
      const emp = employees.find((e) => e.id === t.employeeId);
      return (emp && emp.name.toLowerCase().includes(q)) || t.date.includes(q);
    });
  }, [entries, employees, logSearch]);

  const days = useMemo(() => (rangeStart && rangeEnd && rangeStart <= rangeEnd ? dateRange(rangeStart, rangeEnd) : []), [rangeStart, rangeEnd]);
  const gridHours = useMemo(() => {
    const map = {};
    for (const t of entries) {
      if (t.date < rangeStart || t.date > rangeEnd) continue;
      const key = t.employeeId + "|" + t.date;
      map[key] = (map[key] || 0) + t.hours;
    }
    return map;
  }, [entries, rangeStart, rangeEnd]);
  const empRangeTotals = useMemo(() => employees.map((e) => {
    const calc = calcPay(e, days, gridHours, settings);
    return { ...e, hours: calc.totalHours, regularHours: calc.regularHours, overtimeHours: calc.overtimeHours, pay: calc.gross, deductionLines: calc.deductionLines, totalDeductions: calc.totalDeductions, net: calc.net };
  }), [employees, days, gridHours, settings]);
  const dayTotals = useMemo(() => days.map((d) => {
    let hours = 0;
    for (const e of employees) hours += gridHours[e.id + "|" + d] || 0;
    return hours;
  }), [days, employees, gridHours]);
  const grandTotalHours = empRangeTotals.reduce((s, e) => s + e.hours, 0);
  const grandTotalPay = empRangeTotals.reduce((s, e) => s + e.pay, 0);

  function togglePaid(employeeId) {
    const key = `${employeeId}|${rangeStart}|${rangeEnd}`;
    const next = { ...paidRanges };
    if (next[key]) delete next[key]; else next[key] = true;
    savePaidLocal(next);
  }
  function saveNote(employeeId, date, text) {
    const key = employeeId + "|" + date;
    const next = { ...dayNotes };
    if (text.trim()) next[key] = text.trim(); else delete next[key];
    saveNotesLocal(next);
  }

  const tabs = [
    { id: "log", label: "Time Log", icon: ClockIcon },
    { id: "crew", label: "Crew", icon: UsersIcon },
    { id: "sites", label: "Sites", icon: MapPinIcon },
    { id: "sheet", label: "Timesheet", icon: CalendarIcon },
    { id: "payroll", label: "Payroll", icon: DollarIcon },
    { id: "history", label: "History", icon: HistoryIcon },
  ];

  return (
    <div className="flex-1 flex flex-col">
      <div className="no-print" style={{ background: `linear-gradient(135deg, ${NAVY} 0%, ${NAVY2} 100%)` }}>
        <div className="max-w-4xl mx-auto px-5 pt-6 pb-4">
          <div className="flex items-center justify-between">
            <div className="brand text-2xl" style={{ fontWeight: 800 }}>
              <span style={{ color: "white" }}>Labour</span><span style={{ color: ROYAL_L }}>Arc</span>
            </div>
            <div className="flex items-center gap-3">
              {saving && <span className="text-xs" style={{ color: "#9FB3D9" }}>Saving…</span>}
              <button onClick={() => setContactOpen(true)} className="text-xs" style={{ color: "#9FB3D9" }}>Contact Us</button>
              <button onClick={() => setSettingsOpen(true)} style={{ color: "#C9D3E6" }}><GearIcon size={20} /></button>
              <button onClick={switchUser} className="text-xs" style={{ color: "#9FB3D9" }}>Log Out</button>
            </div>
          </div>
          <div className="mono text-xs mt-1" style={{ color: "#7C8FB5", letterSpacing: "0.08em" }}>EMPLOYER DASHBOARD</div>
          <div className="flex gap-5 mt-5 border-b overflow-x-auto" style={{ borderColor: "rgba(255,255,255,0.12)", scrollbarWidth: "none" }}>
            {tabs.map((t) => {
              const Ic = t.icon; const active = tab === t.id;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} className="text-sm pb-3 flex items-center gap-1.5 flex-shrink-0" style={{ fontWeight: 600, color: active ? "white" : "#8C9BBD", borderBottom: `2px solid ${active ? ROYAL_L : "transparent"}`, whiteSpace: "nowrap" }}>
                  <Ic size={14} />{t.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div className="max-w-4xl mx-auto px-5 py-6 no-print w-full flex-1">
        {tab === "crew" && (
          <div>

/* ================= EMPLOYEE APP ================= */

function roundToHalfHour(hoursDecimal) {
  return Math.round(hoursDecimal * 2) / 2;
}
function minutesBetween(start, end) {
  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins < 0) mins += 24 * 60; // handle overnight shifts
  return mins;
}

function EmployeeApp({ me, entries, dayNotes, jobSites, settings, persist, allEntries, switchUser }) {
  const [tab, setTab] = useState("log");
  const [logDate, setLogDate] = useState(todayStr());
  const [startTime, setStartTime] = useState("");
  const [endTime, setEndTime] = useState("");
  const [logSiteId, setLogSiteId] = useState("");
  const [logNote, setLogNote] = useState("");
  const [rangeStart, setRangeStart] = useState(getMonday(todayStr()));
  const [rangeEnd, setRangeEnd] = useState(todayStr());
  const [payslipOpen, setPayslipOpen] = useState(false);
  const [contactOpen, setContactOpen] = useState(false);

  const myEntries = useMemo(() => allEntries.filter((t) => t.employeeId === me.id).sort((a, b) => (a.date < b.date ? 1 : -1)), [allEntries, me.id]);

  const computedHours = startTime && endTime ? roundToHalfHour(minutesBetween(startTime, endTime) / 60) : 0;

  function addEntry() {
    if (!logDate || !startTime || !endTime || computedHours <= 0) return;
    const entry = { id: uid(), employeeId: me.id, date: logDate, hours: computedHours, startTime, endTime, siteId: logSiteId || null };
    persist("entries", [...allEntries, entry], () => {});
    if (logNote.trim()) {
      const key = me.id + "|" + logDate;
      persist("dayNotes", { ...dayNotes, [key]: logNote.trim() }, () => {});
    }
    setStartTime(""); setEndTime(""); setLogNote(""); setLogSiteId("");
  }
  function setPreset(preset) {
    const t = todayStr();
    if (preset === "thisWeek") { setRangeStart(getMonday(t)); setRangeEnd(t); }
    else if (preset === "lastWeek") { const lm = addDays(getMonday(t), -7); setRangeStart(lm); setRangeEnd(addDays(lm, 6)); }
    else if (preset === "last30") { setRangeStart(addDays(t, -29)); setRangeEnd(t); }
  }
  const days = useMemo(() => (rangeStart <= rangeEnd ? dateRange(rangeStart, rangeEnd) : []), [rangeStart, rangeEnd]);
  const gridHours = useMemo(() => {
    const map = {};
    for (const t of allEntries) {
      if (t.employeeId !== me.id) continue;
      if (t.date < rangeStart || t.date > rangeEnd) continue;
      map[t.employeeId + "|" + t.date] = (map[t.employeeId + "|" + t.date] || 0) + t.hours;
    }
    return map;
  }, [allEntries, me.id, rangeStart, rangeEnd]);
  const calc = useMemo(() => calcPay(me, days, gridHours, settings), [me, days, gridHours, settings]);

  return (
    <div className="flex-1 flex flex-col">
      <div className="no-print" style={{ background: `linear-gradient(135deg, ${NAVY} 0%, ${NAVY2} 100%)` }}>
        <div className="max-w-4xl mx-auto px-5 pt-6 pb-4">
          <div className="flex items-center justify-between">
            <div className="brand text-2xl" style={{ fontWeight: 800 }}>
              <span style={{ color: "white" }}>Labour</span><span style={{ color: ROYAL_L }}>Arc</span>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={() => setContactOpen(true)} className="text-xs" style={{ color: "#9FB3D9" }}>Contact Us</button>
              <button onClick={switchUser} className="text-xs" style={{ color: "#9FB3D9" }}>Log Out</button>
            </div>
          </div>
          <div className="mono text-xs mt-1" style={{ color: "#7C8FB5" }}>{me.name.toUpperCase()}</div>
          <div className="flex gap-5 mt-5 border-b" style={{ borderColor: "rgba(255,255,255,0.12)" }}>
            {[{ id: "log", label: "Log Hours", icon: ClockIcon }, { id: "pay", label: "My Payroll", icon: DollarIcon }].map((t) => {
              const Ic = t.icon; const active = tab === t.id;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} className="text-sm pb-3 flex items-center gap-1.5" style={{ fontWeight: 600, color: active ? "white" : "#8C9BBD", borderBottom: `2px solid ${active ? ROYAL_L : "transparent"}` }}>
                  <Ic size={14} />{t.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div className="max-w-4xl mx-auto px-5 py-6 no-print w-full flex-1">
        {tab === "log" && (
          <div>
            <Card icon={ClockIcon} title="Log Today's Hours">
              <input type="date" value={logDate} onChange={(e) => setLogDate(e.target.value)} className="w-full px-3 py-2 rounded-lg border text-sm mono mb-2" style={{ borderColor: BORDER }} />
              <div className="flex gap-2 mb-2">
                <div className="flex-1">
                  <div className="text-xs mb-1" style={{ color: SLATE }}>Start time</div>
                  <input type="time" value={startTime} onChange={(e) => setStartTime(e.target.value)} className="w-full px-3 py-2 rounded-lg border text-sm mono" style={{ borderColor: BORDER }} />
                </div>

function toISO(d) { return d.toISOString().slice(0, 10); }

function getPayPeriodRange(payPeriod, which) {
  const t = todayStr();
  if (payPeriod.type === "semimonthly") {
    const d = new Date(t + "T00:00:00");
    const day = d.getDate();
    let start, end;
    if (which === "current") {
      if (day <= 15) { start = new Date(d.getFullYear(), d.getMonth(), 1); end = new Date(d.getFullYear(), d.getMonth(), 15); }
      else { start = new Date(d.getFullYear(), d.getMonth(), 16); end = new Date(d.getFullYear(), d.getMonth() + 1, 0); }
    } else {
      if (day <= 15) { end = new Date(d.getFullYear(), d.getMonth(), 0); start = new Date(end.getFullYear(), end.getMonth(), 16); }
      else { start = new Date(d.getFullYear(), d.getMonth(), 1); end = new Date(d.getFullYear(), d.getMonth(), 15); }
    }
    return { start: toISO(start), end: toISO(end) };
  }
  if (payPeriod.type === "biweekly") {
    const anchor = payPeriod.biweeklyAnchor || t;
    const diffDays = Math.floor((new Date(t + "T00:00:00") - new Date(anchor + "T00:00:00")) / 86400000);
    const periodIndex = Math.floor(diffDays / 14);
    const idx = which === "current" ? periodIndex : periodIndex - 1;
    const start = addDays(anchor, idx * 14);
    return { start, end: addDays(start, 13) };
  }
  const monday = getMonday(t);
  const start = which === "current" ? monday : addDays(monday, -7);
  return { start, end: addDays(start, 6) };
}

function applyBreakDeduction(dayHours, settings) {
  if (!dayHours || !settings.breakDeduction || !settings.breakDeduction.enabled) return dayHours;
  const reduced = dayHours - settings.breakDeduction.minutes / 60;
  return Math.max(0, reduced);
}

// Given a per-day hours map for one employee across a date range, returns
// { totalHours, regularHours, overtimeHours } after break deduction + overtime rules.
function calcEmployeeHours(employeeId, days, gridHours, settings) {
  // Apply break deduction per worked day first
  const dayValues = days.map((d) => applyBreakDeduction(gridHours[employeeId + "|" + d] || 0, settings));
  const totalHours = dayValues.reduce((s, h) => s + h, 0);

  if (!settings.overtime || !settings.overtime.enabled) {
    return { totalHours, regularHours: totalHours, overtimeHours: 0 };
  }

  if (settings.overtime.threshold === "daily") {
    let regular = 0, overtime = 0;
    for (const h of dayValues) {
      regular += Math.min(h, 8);
      overtime += Math.max(0, h - 8);
    }
    return { totalHours, regularHours: regular, overtimeHours: overtime };
  }

  // weekly: group by ISO week (Monday start)
  const weekTotals = {};
  days.forEach((d, i) => {
    const wk = getMonday(d);
    weekTotals[wk] = (weekTotals[wk] || 0) + dayValues[i];
  });
  let regular = 0, overtime = 0;
  Object.values(weekTotals).forEach((wkHours) => {
    regular += Math.min(wkHours, 40);
    overtime += Math.max(0, wkHours - 40);
  });
  return { totalHours, regularHours: regular, overtimeHours: overtime };
}

// Full pay breakdown for one employee over a range: gross, itemized deductions, net.
function calcPay(employee, days, gridHours, settings) {
  const { totalHours, regularHours, overtimeHours } = calcEmployeeHours(employee.id, days, gridHours, settings);
  const multiplier = settings.overtime && settings.overtime.enabled ? settings.overtime.multiplier : 1;
  const gross = regularHours * employee.rate + overtimeHours * employee.rate * multiplier;
  const deductionLines = (settings.deductions || []).map((d) => ({
    label: d.label,
    amount: d.type === "percent" ? gross * (d.value / 100) : d.value,
  }));
  const totalDeductions = deductionLines.reduce((s, d) => s + d.amount, 0);
  const net = Math.max(0, gross - totalDeductions);
  return { totalHours, regularHours, overtimeHours, gross, deductionLines, totalDeductions, net };
}

}

        </div>
        <div className="no-print flex gap-2 px-5 pb-5">
          <button onClick={() => window.print()} className="text-sm px-4 py-2.5 rounded-lg flex-1 flex items-center justify-center gap-1.5 text-white" style={{ background: ROYAL, fontWeight: 700 }}><PrinterIcon size={15} />Print / Save as PDF</button>
          <button onClick={onClose} className="text-sm px-4 py-2.5 rounded-lg" style={{ background: BG, color: NAVY, border: `1px solid ${BORDER}`, fontWeight: 600 }}>Close</button>
        </div>
      </div>
    </div>
  );
}

function ShareButton({ employee, rangeStart, rangeEnd, gridHours, settings, fullWidth }) {
  const [copied, setCopied] = useState(false);
  async function doShare() {
    const days = dateRange(rangeStart, rangeEnd);
    const calc = calcPay(employee, days, gridHours, settings);
    const text = `LabourArc Payslip\n${employee.name}\nPeriod: ${rangeStart} to ${rangeEnd}\nHours: ${calc.totalHours.toFixed(2)}h\nGross: ${fmtMoney(calc.gross, settings.currency)}\nNet: ${fmtMoney(calc.net, settings.currency)}\n\nPowered by Barkat Home Creations LTD.`;
    try {
      if (navigator.share) {
        await navigator.share({ title: "Payslip — " + employee.name, text });
      } else {
        await navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }
    } catch {}
  }
  return (
    <button onClick={doShare} className={`text-xs px-3 py-1.5 rounded-full flex items-center gap-1.5 ${fullWidth ? "flex-1 justify-center" : ""}`} style={{ fontWeight: 700, background: BG, color: NAVY, border: `1px solid ${BORDER}` }}>
      {copied ? <CheckIcon size={12} /> : <ShareIcon size={12} />}{copied ? "Copied" : "Share"}
    </button>
  );
}

function Section({ title, children }) {
  return (
    <div className="mb-4 pb-4" style={{ borderBottom: `1px solid ${BORDER}` }}>
      <div className="text-xs uppercase mb-2" style={{ color: SLATE, fontWeight: 700, letterSpacing: "0.05em" }}>{title}</div>
      {children}
    </div>
  );
}

function SettingsModal({ employerPin, workspace, settings, jobSites, onChangePin, onSaveSettings, onSaveSites, allData, onImport, onClose }) {
  const [changing, setChanging] = useState(false);
  const [copied, setCopied] = useState(false);
  const [local, setLocal] = useState(settings);
  const [logoError, setLogoError] = useState("");
  const [newDedLabel, setNewDedLabel] = useState("");
  const [newDedType, setNewDedType] = useState("percent");
  const [newDedValue, setNewDedValue] = useState("");
  const fileRef = useRef(null);
  const logoRef = useRef(null);

  function save(next) {
    setLocal(next);
    onSaveSettings(next);
  }

  function copyCode() {
    if (!workspace) return;
    navigator.clipboard.writeText(workspace.company_code).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }

  function handleLogoFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setLogoError("");
    if (!["image/png", "image/jpeg"].includes(file.type)) { setLogoError("Please use a PNG or JPG image."); return; }
    if (file.size > 500 * 1024) { setLogoError("Please use an image under 500KB. A square logo works best."); return; }
    const reader = new FileReader();
    reader.onload = () => save({ ...local, company: { ...local.company, logo: reader.result } });
    reader.readAsDataURL(file);
  }

  function addDeduction() {
    if (!newDedLabel.trim() || !newDedValue || Number(newDedValue) <= 0) return;
    const next = { ...local, deductions: [...(local.deductions || []), { id: uid(), label: newDedLabel.trim(), type: newDedType, value: Number(newDedValue) }] };
    save(next);
    setNewDedLabel(""); setNewDedValue("");
  }
  function removeDeduction(id) {
    save({ ...local, deductions: (local.deductions || []).filter((d) => d.id !== id) });
  }

  function exportBackup() {
    const blob = new Blob([JSON.stringify(allData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `labourarc-backup-${todayStr()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!window.confirm("This will overwrite the shared data for everyone using the app. Continue?")) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        onImport(data);
        alert("Backup imported.");
      } catch {
        alert("Couldn't read that file — make sure it's a LabourArc backup JSON.");
      }
    };
    reader.readAsText(file);
  }

  return (
    <div className="fixed inset-0 flex items-end sm:items-center justify-center p-0 sm:p-5" style={{ background: "rgba(11,30,61,0.55)", zIndex: 50 }} onClick={onClose}>
      <div className="w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 overflow-y-auto" style={{ background: CARD, maxHeight: "88vh" }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="text-sm" style={{ color: NAVY, fontWeight: 700 }}>Settings</div>
          <button onClick={onClose} style={{ color: SLATE }}><XIcon size={18} /></button>
        </div>

        {workspace && (
          <div className="rounded-lg p-4 mb-4" style={{ background: `linear-gradient(135deg, ${NAVY}, ${NAVY2})` }}>
            <div className="text-xs" style={{ color: "#9FB3D9", fontWeight: 600 }}>{workspace.name}</div>
            <div className="text-xs mt-1 mb-2" style={{ color: "#C9D3E6" }}>Share this code with your crew so they can join:</div>
            <div className="flex items-center justify-between">
              <div className="mono text-2xl" style={{ color: ROYAL_L, fontWeight: 700, letterSpacing: "0.15em" }}>{workspace.company_code}</div>
              <button onClick={copyCode} className="text-xs px-3 py-1.5 rounded-lg" style={{ background: "rgba(255,255,255,0.12)", color: "white", fontWeight: 600 }}>
                {copied ? "Copied" : "Copy"}
              </button>
            </div>
          </div>
        )}

        <Section title="Security">
          {!changing ? (
            <button onClick={() => setChanging(true)} className="w-full text-left text-sm px-4 py-3 rounded-lg mb-2 flex items-center gap-2" style={{ background: BG, color: NAVY, fontWeight: 600 }}>
              <LockIcon size={15} color={ROYAL} />Change Employer PIN
            </button>
          ) : (
            <div className="mb-2">
              <CreatePin title="New Employer PIN" subtitle="" pinLength={local.pinLength} onDone={(pin) => { onChangePin(pin); setChanging(false); }} onBack={() => setChanging(false)} inline />
            </div>
          )}
          <div className="text-xs mb-1" style={{ color: SLATE, fontWeight: 600 }}>PIN length (for you and your crew)</div>
          <div className="flex gap-2">
            {[4, 6].map((n) => (
              <button key={n} onClick={() => save({ ...local, pinLength: n })} className="flex-1 text-sm py-2 rounded-lg" style={{ fontWeight: 700, background: local.pinLength === n ? ROYAL : BG, color: local.pinLength === n ? "white" : NAVY }}>{n}-digit</button>
            ))}
          </div>
        </Section>

        <Section title="Currency">
          <select value={local.currency} onChange={(e) => save({ ...local, currency: e.target.value })} className="w-full px-3 py-2 rounded-lg border text-sm" style={{ borderColor: BORDER }}>
            {CURRENCIES.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
        </Section>

        <Section title="Overtime">
          <div className="flex items-center justify-between mb-2">
            <div className="text-sm" style={{ color: NAVY }}>Enable overtime pay</div>
            <button onClick={() => save({ ...local, overtime: { ...local.overtime, enabled: !local.overtime.enabled } })} className="rounded-full" style={{ width: 42, height: 24, background: local.overtime.enabled ? ROYAL : "#D8DEEA", position: "relative" }}>
              <div className="rounded-full bg-white" style={{ width: 18, height: 18, position: "absolute", top: 3, left: local.overtime.enabled ? 21 : 3, transition: "left .15s" }} />
            </button>
          </div>
          {local.overtime.enabled && (
            <>
              <div className="text-xs mb-1" style={{ color: SLATE, fontWeight: 600 }}>Multiplier</div>
              <div className="flex gap-2 mb-3">
                {[1.5, 2].map((m) => (
                  <button key={m} onClick={() => save({ ...local, overtime: { ...local.overtime, multiplier: m } })} className="flex-1 text-sm py-2 rounded-lg" style={{ fontWeight: 700, background: local.overtime.multiplier === m ? ROYAL : BG, color: local.overtime.multiplier === m ? "white" : NAVY }}>{m}x</button>
                ))}
              </div>
              <div className="text-xs mb-1" style={{ color: SLATE, fontWeight: 600 }}>Threshold</div>
              <div className="flex gap-2">
                <button onClick={() => save({ ...local, overtime: { ...local.overtime, threshold: "weekly" } })} className="flex-1 text-sm py-2 rounded-lg" style={{ fontWeight: 700, background: local.overtime.threshold === "weekly" ? ROYAL : BG, color: local.overtime.threshold === "weekly" ? "white" : NAVY }}>Weekly (&gt;40h)</button>
                <button onClick={() => save({ ...local, overtime: { ...local.overtime, threshold: "daily" } })} className="flex-1 text-sm py-2 rounded-lg" style={{ fontWeight: 700, background: local.overtime.threshold === "daily" ? ROYAL : BG, color: local.overtime.threshold === "daily" ? "white" : NAVY }}>Daily (&gt;8h)</button>
              </div>
            </>
          )}
        </Section>

        <Section title="Break Deduction">
          <div className="flex items-center justify-between mb-2">
            <div className="text-sm" style={{ color: NAVY }}>Automatically deduct a break</div>
            <button onClick={() => save({ ...local, breakDeduction: { ...local.breakDeduction, enabled: !local.breakDeduction.enabled } })} className="rounded-full" style={{ width: 42, height: 24, background: local.breakDeduction.enabled ? ROYAL : "#D8DEEA", position: "relative" }}>
              <div className="rounded-full bg-white" style={{ width: 18, height: 18, position: "absolute", top: 3, left: local.breakDeduction.enabled ? 21 : 3, transition: "left .15s" }} />
            </button>
          </div>
          {local.breakDeduction.enabled && (
            <div className="flex gap-2">
              {[15, 30, 60].map((m) => (
                <button key={m} onClick={() => save({ ...local, breakDeduction: { ...local.breakDeduction, minutes: m } })} className="flex-1 text-sm py-2 rounded-lg" style={{ fontWeight: 700, background: local.breakDeduction.minutes === m ? ROYAL : BG, color: local.breakDeduction.minutes === m ? "white" : NAVY }}>{m === 60 ? "1 hr" : m + " min"}</button>
              ))}
            </div>
          )}
          <div className="text-xs mt-2" style={{ color: SLATE }}>Subtracted once per day worked, before overtime is calculated.</div>
        </Section>

        <Section title="Pay Period">
          <div className="flex gap-2 mb-2">
            {[{ id: "weekly", label: "Weekly" }, { id: "biweekly", label: "Biweekly" }, { id: "semimonthly", label: "Semi-monthly" }].map((p) => (
              <button key={p.id} onClick={() => save({ ...local, payPeriod: { ...local.payPeriod, type: p.id } })} className="flex-1 text-xs py-2 rounded-lg" style={{ fontWeight: 700, background: local.payPeriod.type === p.id ? ROYAL : BG, color: local.payPeriod.type === p.id ? "white" : NAVY }}>{p.label}</button>
            ))}
          </div>
          {local.payPeriod.type === "biweekly" && (
            <div>
              <div className="text-xs mb-1" style={{ color: SLATE, fontWeight: 600 }}>Start date of a recent pay period (used to line up the 2-week cycle)</div>
              <input type="date" value={local.payPeriod.biweeklyAnchor} onChange={(e) => save({ ...local, payPeriod: { ...local.payPeriod, biweeklyAnchor: e.target.value } })} className="w-full px-3 py-2 rounded-lg border text-sm mono" style={{ borderColor: BORDER }} />
            </div>
          )}
        </Section>

        <Section title="Company Profile (shown on payslips)">
          <input value={local.company.name} onChange={(e) => save({ ...local, company: { ...local.company, name: e.target.value } })} placeholder="Company name" className="w-full px-3 py-2 rounded-lg border text-sm mb-2" style={{ borderColor: BORDER }} />
          <input value={local.company.address} onChange={(e) => save({ ...local, company: { ...local.company, address: e.target.value } })} placeholder="Address" className="w-full px-3 py-2 rounded-lg border text-sm mb-2" style={{ borderColor: BORDER }} />
          <div className="flex gap-2 mb-2">
            <input value={local.company.phone} onChange={(e) => save({ ...local, company: { ...local.company, phone: e.target.value } })} placeholder="Phone" className="flex-1 px-3 py-2 rounded-lg border text-sm" style={{ borderColor: BORDER }} />
            <input value={local.company.email} onChange={(e) => save({ ...local, company: { ...local.company, email: e.target.value } })} placeholder="Email" className="flex-1 px-3 py-2 rounded-lg border text-sm" style={{ borderColor: BORDER }} />
          </div>
          <div className="text-xs mb-1" style={{ color: SLATE }}>Logo: PNG or JPG, under 500KB, square works best.</div>
          {local.company.logo && <img src={local.company.logo} alt="" style={{ maxHeight: 40, marginBottom: 6 }} />}
          {logoError && <div className="text-xs mb-2" style={{ color: RED }}>{logoError}</div>}
          <button onClick={() => logoRef.current?.click()} className="text-xs px-3 py-2 rounded-lg" style={{ background: BG, color: NAVY, fontWeight: 600 }}>{local.company.logo ? "Change Logo" : "Upload Logo"}</button>
          <input ref={logoRef} type="file" accept="image/png,image/jpeg" onChange={handleLogoFile} className="hidden" />
        </Section>

        <Section title="Tax / Deductions">
          {(local.deductions || []).map((d) => (
            <div key={d.id} className="flex items-center justify-between text-sm mb-1.5 px-3 py-2 rounded-lg" style={{ background: BG }}>
              <div style={{ color: NAVY }}>{d.label} <span className="mono text-xs" style={{ color: SLATE }}>({d.type === "percent" ? d.value + "%" : fmtMoney(d.value, local.currency)})</span></div>
              <button onClick={() => removeDeduction(d.id)} className="text-xs" style={{ color: RED, fontWeight: 600 }}>Remove</button>
            </div>
          ))}
          <div className="flex gap-2 mt-2 flex-wrap">
            <input value={newDedLabel} onChange={(e) => setNewDedLabel(e.target.value)} placeholder="Label (e.g. Federal Tax)" className="flex-1 min-w-[120px] px-3 py-2 rounded-lg border text-sm" style={{ borderColor: BORDER }} />
            <select value={newDedType} onChange={(e) => setNewDedType(e.target.value)} className="px-3 py-2 rounded-lg border text-sm" style={{ borderColor: BORDER }}>
              <option value="percent">%</option>
              <option value="flat">flat</option>
            </select>
            <input value={newDedValue} onChange={(e) => setNewDedValue(e.target.value)} type="number" placeholder="Value" className="w-20 px-3 py-2 rounded-lg border text-sm mono" style={{ borderColor: BORDER }} />
            <button onClick={addDeduction} className="text-sm px-3 py-2 rounded-lg text-white" style={{ background: ROYAL, fontWeight: 600 }}>Add</button>
          </div>
        </Section>

        <Section title="Backup">
          <button onClick={exportBackup} className="w-full text-left text-sm px-4 py-3 rounded-lg mb-2 flex items-center gap-2" style={{ background: BG, color: NAVY, fontWeight: 600 }}>
            <DownloadIcon size={15} color={ROYAL} />Export Backup (JSON)
          </button>
          <button onClick={() => fileRef.current?.click()} className="w-full text-left text-sm px-4 py-3 rounded-lg flex items-center gap-2" style={{ background: BG, color: NAVY, fontWeight: 600 }}>
            <UploadIcon size={15} color={ROYAL} />Import Backup
          </button>
          <input ref={fileRef} type="file" accept="application/json" onChange={handleImportFile} className="hidden" />
        </Section>

        <button onClick={onClose} className="w-full text-sm px-4 py-2.5 rounded-lg mt-2" style={{ background: NAVY, color: "white", fontWeight: 700 }}>Done</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
</body>
</html>
