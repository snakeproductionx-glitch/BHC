<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Barkat Home Creations — Crew Timecard & Payroll</title>
<link rel="icon" href="data:," />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');
  body { margin: 0; }
  .brand { font-family: 'Fraunces', serif; }
  .disp { font-family: 'Zilla Slab', serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.35); }
  ::-webkit-scrollbar { height: 6px; }
  ::-webkit-scrollbar-thumb { background: #CFC3A9; border-radius: 3px; }
  @media print {
    body * { visibility: hidden; }
    .print-area, .print-area * { visibility: visible; }
    .print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 24px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const WOOD_DARK = "#3B2B1F";
const WOOD_DARK2 = "#2C2015";
const WOOD = "#8B5E3C";
const CLAY = "#B5654A";
const CLAY_D = "#9C5540";
const SAGE = "#748265";
const SAGE_D = "#5F6E52";
const SAND = "#E9E1D2";
const CARD = "#FBF8F1";
const INK = "#332419";
const STONE = "#8C8577";
const BORDER = "#DDD2BC";

const uid = () => Math.random().toString(36).slice(2, 10);

function todayStr() { return new Date().toISOString().slice(0, 10); }
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function getMonday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}
function fmtDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function fmtDateWeekday(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function fmtDateFull(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}
function fmtMoney(n) {
  return n.toLocaleString("en-US", { style: "currency", currency: "USD" });
}
function dateRange(start, end) {
  const out = [];
  let cur = start;
  let guard = 0;
  while (cur <= end && guard < 400) {
    out.push(cur);
    cur = addDays(cur, 1);
    guard++;
  }
  return out;
}

function loadLS(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch {
    return fallback;
  }
}
function saveLS(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch {
    return false;
  }
}

/* ---- Inline icons (no external icon library needed) ---- */
function Icon({ children, size = 16, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {children}
    </svg>
  );
}
const ClockIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></Icon>;
const UsersIcon = (p) => <Icon {...p}><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6"/><circle cx="17" cy="9" r="2.6"/><path d="M15.5 14.2c2.7.4 4.5 2.5 4.5 5.8"/></Icon>;
const CalendarIcon = (p) => <Icon {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></Icon>;
const DollarIcon = (p) => <Icon {...p}><path d="M12 2v20M17 6.5c0-1.9-2.2-3-5-3s-5 1.1-5 3 2.2 2.7 5 3 5 1.1 5 3-2.2 3-5 3-5-1.1-5-3"/></Icon>;
const PrinterIcon = (p) => <Icon {...p}><path d="M6 9V3h12v6"/><rect x="4" y="9" width="16" height="8" rx="1.5"/><path d="M6 17v4h12v-4"/></Icon>;
const NoteIcon = (p) => <Icon {...p}><path d="M4 4h13l3 3v13H4z"/><path d="M17 4v3h3"/><path d="M8 12h8M8 16h5"/></Icon>;
const XIcon = (p) => <Icon {...p}><path d="M6 6l12 12M18 6L6 18"/></Icon>;
const HammerIcon = (p) => <Icon {...p}><path d="M15 12l6 6-2 2-6-6"/><path d="M4 15l6.5-6.5a3 3 0 0 1 4 0l.5.5a3 3 0 0 1 0 4L8.5 20 4 15z"/></Icon>;

function App() {
  const [employees, setEmployees] = useState(() => loadLS("bhc_employees", []));
  const [entries, setEntries] = useState(() => loadLS("bhc_entries", []));
  const [paidRanges, setPaidRanges] = useState(() => loadLS("bhc_paidRanges", {}));
  const [dayNotes, setDayNotes] = useState(() => loadLS("bhc_dayNotes", {}));
  const [tab, setTab] = useState("log");
  const [error, setError] = useState("");

  const [empName, setEmpName] = useState("");
  const [empRate, setEmpRate] = useState("");

  const [logEmpIds, setLogEmpIds] = useState([]);
  const [logDate, setLogDate] = useState(todayStr());
  const [logHours, setLogHours] = useState("");

  const [rangeStart, setRangeStart] = useState(getMonday(todayStr()));
  const [rangeEnd, setRangeEnd] = useState(todayStr());

  const [noteCell, setNoteCell] = useState(null);
  const [payslipEmp, setPayslipEmp] = useState(null);

  function persistEmployees(next) {
    setEmployees(next);
    if (!saveLS("bhc_employees", next)) setError("Couldn't save. Your browser storage may be full or blocked.");
  }
  function persistEntries(next) {
    setEntries(next);
    if (!saveLS("bhc_entries", next)) setError("Couldn't save. Your browser storage may be full or blocked.");
  }
  function persistPaidRanges(next) {
    setPaidRanges(next);
    if (!saveLS("bhc_paidRanges", next)) setError("Couldn't save. Your browser storage may be full or blocked.");
  }
  function persistDayNotes(next) {
    setDayNotes(next);
    if (!saveLS("bhc_dayNotes", next)) setError("Couldn't save. Your browser storage may be full or blocked.");
  }

  function addEmployee() {
    if (!empName.trim() || !empRate || Number(empRate) <= 0) return;
    persistEmployees([...employees, { id: uid(), name: empName.trim(), rate: Number(empRate) }]);
    setEmpName(""); setEmpRate("");
  }
  function removeEmployee(id) {
    persistEmployees(employees.filter((e) => e.id !== id));
    persistEntries(entries.filter((t) => t.employeeId !== id));
  }

  function toggleLogEmp(id) {
    setLogEmpIds((prev) => (prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]));
  }
  function toggleLogEmpAll() {
    setLogEmpIds((prev) => (prev.length === employees.length ? [] : employees.map((e) => e.id)));
  }
  function addEntry() {
    if (logEmpIds.length === 0 || !logDate || !logHours || Number(logHours) <= 0) return;
    const newEntries = logEmpIds.map((id) => ({ id: uid(), employeeId: id, date: logDate, hours: Number(logHours) }));
    persistEntries([...entries, ...newEntries]);
    setLogHours(""); setLogEmpIds([]);
  }
  function removeEntry(id) {
    persistEntries(entries.filter((t) => t.id !== id));
  }

  function setPreset(preset) {
    const t = todayStr();
    if (preset === "thisWeek") { setRangeStart(getMonday(t)); setRangeEnd(t); }
    else if (preset === "lastWeek") { const lastMon = addDays(getMonday(t), -7); setRangeStart(lastMon); setRangeEnd(addDays(lastMon, 6)); }
    else if (preset === "last30") { setRangeStart(addDays(t, -29)); setRangeEnd(t); }
  }

  const days = useMemo(() => (rangeStart && rangeEnd && rangeStart <= rangeEnd ? dateRange(rangeStart, rangeEnd) : []), [rangeStart, rangeEnd]);

  const gridHours = useMemo(() => {
    const map = {};
    for (const t of entries) {
      if (t.date < rangeStart || t.date > rangeEnd) continue;
      const key = t.employeeId + "|" + t.date;
      map[key] = (map[key] || 0) + t.hours;
    }
    return map;
  }, [entries, rangeStart, rangeEnd]);

  const empRangeTotals = useMemo(() => employees.map((e) => {
    let hours = 0;
    for (const d of days) hours += gridHours[e.id + "|" + d] || 0;
    return { ...e, hours, pay: hours * e.rate };
  }), [employees, days, gridHours]);

  const dayTotals = useMemo(() => days.map((d) => {
    let hours = 0;
    for (const e of employees) hours += gridHours[e.id + "|" + d] || 0;
    return hours;
  }), [days, employees, gridHours]);

  const grandTotalHours = empRangeTotals.reduce((s, e) => s + e.hours, 0);
  const grandTotalPay = empRangeTotals.reduce((s, e) => s + e.pay, 0);

  function togglePaid(employeeId) {
    const key = `${employeeId}|${rangeStart}|${rangeEnd}`;
    const next = { ...paidRanges };
    if (next[key]) delete next[key]; else next[key] = true;
    persistPaidRanges(next);
  }
  function saveNote(employeeId, date, text) {
    const key = employeeId + "|" + date;
    const next = { ...dayNotes };
    if (text.trim()) next[key] = text.trim(); else delete next[key];
    persistDayNotes(next);
  }

  const sortedEntries = [...entries].sort((a, b) => (a.date < b.date ? 1 : -1));

  const tabs = [
    { id: "log", label: "Time Log", icon: ClockIcon },
    { id: "crew", label: "Crew", icon: UsersIcon },
    { id: "sheet", label: "Timesheet", icon: CalendarIcon },
    { id: "payroll", label: "Payroll", icon: DollarIcon },
  ];

  return (
    <div style={{ minHeight: "100vh", background: SAND, fontFamily: "'Inter', sans-serif" }}>
      <div
        className="no-print px-5 pt-7 pb-4"
        style={{
          backgroundImage: `repeating-linear-gradient(95deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 7px), linear-gradient(160deg, ${WOOD_DARK}, ${WOOD_DARK2})`,
          borderBottom: `3px solid ${CLAY}`,
        }}
      >
        <div className="max-w-4xl mx-auto">
          <div className="flex items-center gap-3">
            <div className="flex items-center justify-center rounded-md flex-shrink-0" style={{ width: 42, height: 42, background: CLAY }}>
              <HammerIcon size={19} color={CARD} />
            </div>
            <div>
              <div className="brand text-white text-2xl sm:text-3xl leading-tight" style={{ fontWeight: 700 }}>Barkat Home Creations</div>
              <div className="mono text-xs mt-0.5" style={{ color: "#C9B99C", letterSpacing: "0.08em" }}>CREW TIMECARD &amp; PAYROLL</div>
            </div>
          </div>
          <div className="flex gap-5 mt-6 border-b" style={{ borderColor: "rgba(255,255,255,0.12)" }}>
            {tabs.map((t) => {
              const Ic = t.icon;
              const active = tab === t.id;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} className="disp text-sm pb-3 flex items-center gap-1.5"
                  style={{ fontWeight: 600, color: active ? "#F3EAD8" : "#9C8F78", borderBottom: `2px solid ${active ? CLAY : "transparent"}`, background: "none", border: "none", borderBottomWidth: 2, borderBottomStyle: "solid", cursor: "pointer" }}>
                  <Ic size={15} />
                  {t.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div className="max-w-4xl mx-auto px-5 py-6 no-print">
        {error && <div className="mb-4 px-3 py-2 rounded-md text-sm text-white" style={{ background: CLAY_D }}>{error}</div>}

        {tab === "crew" && (
          <div>
            <Card icon={UsersIcon} title="Add Crew Member">
              <div className="flex gap-2 flex-wrap">
                <input value={empName} onChange={(e) => setEmpName(e.target.value)} placeholder="Name" className="flex-1 min-w-[140px] px-3 py-2 rounded-md border text-sm" style={{ borderColor: BORDER, background: "white" }} />
                <input value={empRate} onChange={(e) => setEmpRate(e.target.value)} placeholder="Hourly rate" type="number" className="w-32 px-3 py-2 rounded-md border text-sm mono" style={{ borderColor: BORDER, background: "white" }} />
                <button onClick={addEmployee} className="disp text-sm px-4 py-2 rounded-md text-white" style={{ background: WOOD, fontWeight: 600 }}>Add</button>
              </div>
            </Card>
            {employees.length === 0 ? <Empty text="No crew added yet. Add your first employee above." /> : (
              <div className="space-y-2">
                {employees.map((e) => (
                  <Row key={e.id}>
                    <div>
                      <div style={{ fontWeight: 600, color: INK }}>{e.name}</div>
                      <div className="mono text-xs" style={{ color: STONE }}>{fmtMoney(e.rate)}/hr</div>
                    </div>
                    <button onClick={() => removeEmployee(e.id)} className="text-xs disp px-2 py-1" style={{ color: CLAY_D, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Remove</button>
                  </Row>
                ))}
              </div>
            )}
          </div>
        )}

        {tab === "log" && (
          <div>
            <Card icon={ClockIcon} title="Log Hours">
              {employees.length === 0 ? <div className="text-sm" style={{ color: STONE }}>Add crew members first, on the Crew tab.</div> : (
                <div>
                  <div className="flex items-center justify-between mb-2">
                    <div className="text-xs disp" style={{ color: STONE, fontWeight: 600 }}>Select workers</div>
                    <button onClick={toggleLogEmpAll} className="text-xs disp" style={{ color: WOOD, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>
                      {logEmpIds.length === employees.length ? "Clear all" : "Select all"}
                    </button>
                  </div>
                  <div className="flex flex-wrap gap-2 mb-3">
                    {employees.map((e) => {
                      const active = logEmpIds.includes(e.id);
                      return (
                        <button key={e.id} type="button" onClick={() => toggleLogEmp(e.id)} className="text-sm px-3 py-1.5 rounded-md"
                          style={{ fontWeight: 600, background: active ? WOOD : "white", color: active ? "white" : INK, border: `1px solid ${active ? WOOD : BORDER}`, cursor: "pointer" }}>
                          {active ? "✓ " : ""}{e.name}
                        </button>
                      );
                    })}
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    <input type="date" value={logDate} onChange={(e) => setLogDate(e.target.value)} className="px-3 py-2 rounded-md border text-sm mono" style={{ borderColor: BORDER, background: "white" }} />
                    <input type="number" value={logHours} onChange={(e) => setLogHours(e.target.value)} placeholder="Hours" className="w-24 px-3 py-2 rounded-md border text-sm mono" style={{ borderColor: BORDER, background: "white" }} />
                    <button onClick={addEntry} disabled={logEmpIds.length === 0} className="disp text-sm px-4 py-2 rounded-md"
                      style={{ background: logEmpIds.length === 0 ? STONE : CLAY, color: "white", fontWeight: 600, border: "none", cursor: logEmpIds.length === 0 ? "default" : "pointer" }}>
                      Punch In {logEmpIds.length > 0 ? `(${logEmpIds.length})` : ""}
                    </button>
                  </div>
                </div>
              )}
            </Card>
            {sortedEntries.length === 0 ? <Empty text="No hours logged yet." /> : (
              <div className="space-y-2">
                {sortedEntries.map((t) => {
                  const emp = employees.find((e) => e.id === t.employeeId);
                  return (
                    <Row key={t.id}>
                      <div className="flex items-center gap-3">
                        <div className="mono text-xs px-2 py-1 rounded" style={{ background: SAND, color: INK }}>{fmtDate(t.date)}</div>
                        <div style={{ fontWeight: 600, color: INK }}>{emp ? emp.name : "Unknown"}</div>
                      </div>
                      <div className="flex items-center gap-3">
                        <div className="mono text-sm" style={{ color: WOOD, fontWeight: 700 }}>{t.hours}h</div>
                        <button onClick={() => removeEntry(t.id)} className="text-xs disp" style={{ color: CLAY_D, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Delete</button>
                      </div>
                    </Row>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {tab === "sheet" && (
          <div>
            <DateRangeBar rangeStart={rangeStart} rangeEnd={rangeEnd} setRangeStart={setRangeStart} setRangeEnd={setRangeEnd} setPreset={setPreset} />
            <div className="text-xs mb-3 flex items-center gap-1.5" style={{ color: STONE }}><NoteIcon size={13} />Tap any cell to add a note for that day.</div>
            {employees.length === 0 || days.length === 0 ? <Empty text="Add crew and pick a valid date range to see the timesheet." /> : (
              <div className="overflow-x-auto rounded-md" style={{ border: `1px solid ${BORDER}`, background: CARD }}>
                <table className="w-full text-sm" style={{ borderCollapse: "collapse" }}>
                  <thead>
                    <tr style={{ background: WOOD_DARK }}>
                      <th className="disp text-left px-3 py-2.5 text-xs" style={{ color: "white", fontWeight: 600, position: "sticky", left: 0, background: WOOD_DARK }}>Date</th>
                      {employees.map((e) => <th key={e.id} className="disp text-right px-3 py-2.5 text-xs whitespace-nowrap" style={{ color: "white", fontWeight: 600 }}>{e.name}</th>)}
                      <th className="disp text-right px-3 py-2.5 text-xs" style={{ color: "#E4C9A8", fontWeight: 700 }}>Day Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {days.map((d, i) => (
                      <tr key={d} style={{ borderTop: `1px solid ${BORDER}` }}>
                        <td className="mono px-3 py-2 text-xs whitespace-nowrap" style={{ color: INK, position: "sticky", left: 0, background: CARD, fontWeight: 600 }}>{fmtDateWeekday(d)}</td>
                        {employees.map((e) => {
                          const h = gridHours[e.id + "|" + d] || 0;
                          const hasNote = !!dayNotes[e.id + "|" + d];
                          return (
                            <td key={e.id} className="text-right px-1 py-1">
                              <button onClick={() => setNoteCell({ employeeId: e.id, date: d })} className="relative mono w-full text-right px-2 py-1.5 rounded"
                                style={{ color: h ? WOOD : "#C9BFA9", background: hasNote ? "#EFE0C6" : "transparent", border: "none", cursor: "pointer" }}>
                                {h ? h : "–"}
                                {hasNote && <span className="absolute rounded-full" style={{ top: 3, right: 3, width: 5, height: 5, background: CLAY }} />}
                              </button>
                            </td>
                          );
                        })}
                        <td className="mono text-right px-3 py-2" style={{ color: CLAY_D, fontWeight: 700 }}>{dayTotals[i] || "–"}</td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{ borderTop: `2px solid ${WOOD_DARK}`, background: SAND }}>
                      <td className="disp px-3 py-2.5 text-xs" style={{ color: INK, fontWeight: 700, position: "sticky", left: 0, background: SAND }}>Total</td>
                      {empRangeTotals.map((e) => <td key={e.id} className="mono text-right px-3 py-2.5" style={{ color: INK, fontWeight: 700 }}>{e.hours}</td>)}
                      <td className="mono text-right px-3 py-2.5" style={{ color: CLAY_D, fontWeight: 700 }}>{grandTotalHours}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            )}
          </div>
        )}

        {tab === "payroll" && (
          <div>
            <DateRangeBar rangeStart={rangeStart} rangeEnd={rangeEnd} setRangeStart={setRangeStart} setRangeEnd={setRangeEnd} setPreset={setPreset} />
            {employees.length === 0 ? <Empty text="Add crew to see payroll." /> : (
              <div className="space-y-3">
                <div className="flex justify-between items-center px-5 py-4 rounded-md mb-1" style={{ background: WOOD_DARK, color: "white" }}>
                  <div>
                    <div className="disp text-xs" style={{ color: "#B9AB90", fontWeight: 600 }}>Period Total</div>
                    <div className="mono text-xs mt-0.5" style={{ color: "#C9B99C" }}>{rangeStart} to {rangeEnd}</div>
                  </div>
                  <div className="mono text-2xl" style={{ color: "#E4C9A8", fontWeight: 700 }}>{fmtMoney(grandTotalPay)}</div>
                </div>
                {empRangeTotals.map((e) => {
                  const paid = !!paidRanges[`${e.id}|${rangeStart}|${rangeEnd}`];
                  return (
                    <div key={e.id} className="relative overflow-hidden px-4 py-4 rounded-md" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
                      {paid && (
                        <div className="disp absolute" style={{ top: 8, right: -30, transform: "rotate(18deg)", color: SAGE_D, border: `3px solid ${SAGE_D}`, padding: "2px 34px", fontWeight: 700, fontSize: 13, letterSpacing: "0.12em", opacity: 0.85 }}>PAID</div>
                      )}
                      <div className="mb-2">
                        <div style={{ fontWeight: 700, color: INK }}>{e.name}</div>
                        <div className="mono text-xs" style={{ color: STONE }}>{fmtMoney(e.rate)}/hr</div>
                      </div>
                      <div className="flex flex-wrap gap-4 mono text-sm mb-3" style={{ color: INK }}>
                        <div><span style={{ color: STONE }}>Hours: </span>{e.hours}h</div>
                        <div style={{ fontWeight: 700, color: WOOD }}>{fmtMoney(e.pay)}</div>
                      </div>
                      <div className="flex gap-2 flex-wrap">
                        <button onClick={() => togglePaid(e.id)} className="disp text-xs px-3 py-1.5 rounded-md"
                          style={{ fontWeight: 700, background: paid ? SAND : SAGE, color: paid ? INK : "white", border: paid ? `1px solid ${BORDER}` : "none", cursor: "pointer" }}>
                          {paid ? "Mark Unpaid" : "Mark Paid"}
                        </button>
                        <button onClick={() => setPayslipEmp(e.id)} disabled={e.hours === 0} className="disp text-xs px-3 py-1.5 rounded-md flex items-center gap-1.5"
                          style={{ fontWeight: 700, background: e.hours === 0 ? "#E1D8C4" : CLAY, color: "white", border: "none", cursor: e.hours === 0 ? "default" : "pointer" }}>
                          <PrinterIcon size={12} />Payslip PDF
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {noteCell && (
        <NoteModal
          employee={employees.find((e) => e.id === noteCell.employeeId)}
          date={noteCell.date}
          hours={gridHours[noteCell.employeeId + "|" + noteCell.date] || 0}
          existing={dayNotes[noteCell.employeeId + "|" + noteCell.date] || ""}
          onSave={(text) => { saveNote(noteCell.employeeId, noteCell.date, text); setNoteCell(null); }}
          onClose={() => setNoteCell(null)}
        />
      )}
      {payslipEmp && (
        <PayslipModal
          employee={employees.find((e) => e.id === payslipEmp)}
          rangeStart={rangeStart} rangeEnd={rangeEnd} days={days} gridHours={gridHours} dayNotes={dayNotes}
          onClose={() => setPayslipEmp(null)}
        />
      )}
    </div>
  );
}

function Card({ icon: Ic, title, children }) {
  return (
    <div className="p-4 rounded-md mb-5" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
      {title && <div className="disp text-sm mb-3 flex items-center gap-2" style={{ color: INK, fontWeight: 600 }}>{Ic && <Ic size={15} color={CLAY} />}{title}</div>}
      {children}
    </div>
  );
}
function Row({ children }) {
  return <div className="flex items-center justify-between px-4 py-3 rounded-md" style={{ background: CARD, border: `1px solid ${BORDER}` }}>{children}</div>;
}
function Empty({ text }) {
  return <div className="text-center py-10 text-sm" style={{ color: STONE }}>{text}</div>;
}
function DateRangeBar({ rangeStart, rangeEnd, setRangeStart, setRangeEnd, setPreset }) {
  return (
    <div className="p-4 rounded-md mb-4 flex flex-wrap items-center gap-3" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
      <div className="flex items-center gap-2">
        <input type="date" value={rangeStart} onChange={(e) => setRangeStart(e.target.value)} className="px-3 py-2 rounded-md border text-sm mono" style={{ borderColor: BORDER, background: "white" }} />
        <span className="text-sm" style={{ color: STONE }}>to</span>
        <input type="date" value={rangeEnd} onChange={(e) => setRangeEnd(e.target.value)} className="px-3 py-2 rounded-md border text-sm mono" style={{ borderColor: BORDER, background: "white" }} />
      </div>
      <div className="flex gap-1.5 flex-wrap">
        {[{ id: "thisWeek", label: "This Week" }, { id: "lastWeek", label: "Last Week" }, { id: "last30", label: "Last 30 Days" }].map((p) => (
          <button key={p.id} onClick={() => setPreset(p.id)} className="disp text-xs px-3 py-1.5 rounded-md" style={{ fontWeight: 600, background: SAND, color: INK, border: `1px solid ${BORDER}`, cursor: "pointer" }}>{p.label}</button>
        ))}
      </div>
    </div>
  );
}
function NoteModal({ employee, date, hours, existing, onSave, onClose }) {
  const [text, setText] = useState(existing);
  return (
    <div className="no-print fixed inset-0 flex items-end sm:items-center justify-center p-0 sm:p-5" style={{ background: "rgba(43,32,21,0.55)", zIndex: 50 }} onClick={onClose}>
      <div className="w-full sm:max-w-sm rounded-t-2xl sm:rounded-md p-5" style={{ background: CARD }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-start justify-between mb-3">
          <div>
            <div className="disp text-sm flex items-center gap-1.5" style={{ color: INK, fontWeight: 700 }}><NoteIcon size={15} color={CLAY} />Day Note</div>
            <div className="text-sm mt-1" style={{ color: STONE }}>{employee ? employee.name : "Unknown"} · {fmtDateFull(date)}</div>
          </div>
          <button onClick={onClose} style={{ color: STONE, background: "none", border: "none", cursor: "pointer" }}><XIcon size={18} /></button>
        </div>
        <div className="mono text-xs mb-3" style={{ color: WOOD }}>Hours logged that day: {hours || 0}h</div>
        <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder="e.g. Poured foundation at Site B, left early for supply run…" rows={4} className="w-full px-3 py-2 rounded-md border text-sm mb-4" style={{ borderColor: BORDER, background: "white" }} />
        <div className="flex gap-2">
          <button onClick={() => onSave(text)} className="disp text-sm px-4 py-2.5 rounded-md flex-1" style={{ background: CLAY, color: "white", fontWeight: 700, border: "none", cursor: "pointer" }}>Save Note</button>
          <button onClick={onClose} className="disp text-sm px-4 py-2.5 rounded-md" style={{ background: SAND, color: INK, border: `1px solid ${BORDER}`, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}
function PayslipModal({ employee, rangeStart, rangeEnd, days, gridHours, dayNotes, onClose }) {
  if (!employee) return null;
  const rows = days.map((d) => ({ date: d, hours: gridHours[employee.id + "|" + d] || 0, note: dayNotes[employee.id + "|" + d] || "" })).filter((r) => r.hours > 0 || r.note);
  const totalHours = rows.reduce((s, r) => s + r.hours, 0);
  const totalPay = totalHours * employee.rate;
  return (
    <div className="fixed inset-0 flex items-start sm:items-center justify-center p-0 sm:p-5 overflow-y-auto" style={{ background: "rgba(43,32,21,0.55)", zIndex: 50 }}>
      <div className="w-full sm:max-w-lg sm:rounded-md my-0 sm:my-8" style={{ background: "white" }}>
        <div className="no-print flex items-center justify-between px-5 py-4" style={{ borderBottom: `1px solid ${BORDER}` }}>
          <div className="disp text-sm" style={{ color: INK, fontWeight: 700 }}>Payslip Preview</div>
          <button onClick={onClose} style={{ color: STONE, background: "none", border: "none", cursor: "pointer" }}><XIcon size={18} /></button>
        </div>
        <div className="print-area px-6 py-6">
          <div className="flex items-center justify-between mb-6 pb-4" style={{ borderBottom: `2px solid ${WOOD_DARK}` }}>
            <div>
              <div className="brand text-xl" style={{ color: INK, fontWeight: 700 }}>Barkat Home Creations</div>
              <div className="mono text-xs mt-0.5" style={{ color: CLAY, letterSpacing: "0.08em" }}>PAYROLL STATEMENT</div>
            </div>
            <div className="flex items-center justify-center rounded-md" style={{ width: 32, height: 32, background: CLAY }}><HammerIcon size={15} color="white" /></div>
          </div>
          <div className="grid grid-cols-2 gap-3 mb-6 text-sm">
            <div><div className="mono text-xs" style={{ color: STONE }}>EMPLOYEE</div><div style={{ color: INK, fontWeight: 700 }}>{employee.name}</div></div>
            <div><div className="mono text-xs" style={{ color: STONE }}>HOURLY RATE</div><div style={{ color: INK, fontWeight: 700 }}>{fmtMoney(employee.rate)}</div></div>
            <div className="col-span-2"><div className="mono text-xs" style={{ color: STONE }}>PAY PERIOD</div><div style={{ color: INK, fontWeight: 700 }}>{fmtDateFull(rangeStart)} — {fmtDateFull(rangeEnd)}</div></div>
          </div>
          <table className="w-full text-sm mb-4" style={{ borderCollapse: "collapse" }}>
            <thead><tr style={{ borderBottom: `1px solid ${WOOD_DARK}` }}><th className="disp text-left py-2 text-xs" style={{ color: INK }}>Date</th><th className="disp text-right py-2 text-xs" style={{ color: INK }}>Hours</th><th className="disp text-right py-2 text-xs" style={{ color: INK }}>Pay</th></tr></thead>
            <tbody>
              {rows.length === 0 ? (
                <tr><td colSpan={3} className="py-4 text-center text-sm" style={{ color: STONE }}>No hours logged in this period.</td></tr>
              ) : rows.map((r) => (
                <React.Fragment key={r.date}>
                  <tr style={{ borderBottom: `1px solid ${BORDER}` }}>
                    <td className="mono py-2 text-xs" style={{ color: INK }}>{fmtDateWeekday(r.date)}</td>
                    <td className="mono text-right py-2" style={{ color: INK }}>{r.hours || "–"}</td>
                    <td className="mono text-right py-2" style={{ color: INK }}>{r.hours ? fmtMoney(r.hours * employee.rate) : "–"}</td>
                  </tr>
                  {r.note && <tr style={{ borderBottom: `1px solid ${BORDER}` }}><td colSpan={3} className="pb-2 text-xs italic" style={{ color: STONE }}>{r.note}</td></tr>}
                </React.Fragment>
              ))}
            </tbody>
            <tfoot><tr style={{ borderTop: `2px solid ${WOOD_DARK}` }}><td className="disp py-2.5 text-xs" style={{ color: INK, fontWeight: 700 }}>Total</td><td className="mono text-right py-2.5" style={{ color: INK, fontWeight: 700 }}>{totalHours}h</td><td className="mono text-right py-2.5" style={{ color: CLAY, fontWeight: 700 }}>{fmtMoney(totalPay)}</td></tr></tfoot>
          </table>
          <div className="mono text-xs text-center pt-4" style={{ color: STONE, borderTop: `1px solid ${BORDER}` }}>Generated by Barkat Home Creations Workforce Tracker</div>
        </div>
        <div className="no-print flex gap-2 px-5 pb-5">
          <button onClick={() => window.print()} className="disp text-sm px-4 py-2.5 rounded-md flex-1 flex items-center justify-center gap-1.5" style={{ background: CLAY, color: "white", fontWeight: 700, border: "none", cursor: "pointer" }}><PrinterIcon size={15} />Print / Save as PDF</button>
          <button onClick={onClose} className="disp text-sm px-4 py-2.5 rounded-md" style={{ background: SAND, color: INK, border: `1px solid ${BORDER}`, fontWeight: 600, cursor: "pointer" }}>Close</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
